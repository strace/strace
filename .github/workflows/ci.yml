name: CI

on: [push, pull_request]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SLEEP_A_BIT: sleep 0.2
  VERBOSE: 1

jobs:
  whitespace-errors:
    name: Check for whitespace errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: check
        run: git diff-index --check --cached 4b825dc642cb6eb9a060e54bf8d69288fbee4904

  coverage: # the longest of all build jobs
    name: Check coverage
    runs-on: ubuntu-latest
    env:
      CHECK: coverage
      CC: gcc
      TARGET: x86_64
      KHEADERS: torvalds/linux
      STACKTRACE: libdw
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: install dependencies
        run: ci/install-dependencies.sh
      - name: build check
        run: ci/run-build-and-tests.sh
      - name: upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2	# v6.0.0
        with:
          fail_ci_if_error: true
          plugins: gcov
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: src

  build-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cc: gcc-15, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: gcc-15, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: gcc-15, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: gcc-15, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: gcc-15, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: gcc-14, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: gcc-14, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: gcc-14, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: gcc-14, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: gcc-14, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: gcc-14, target: aarch64, variant: kheaders, runner: ubuntu-24.04-arm }
          - { cc: gcc-14, target: aarch64, variant: libdw, runner: ubuntu-24.04-arm }
          - { cc: gcc-14, target: aarch64, variant: libunwind, runner: ubuntu-24.04-arm }
          - { cc: gcc-13, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: gcc-13, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: gcc-13, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: gcc-13, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: gcc-13, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: gcc-13, target: aarch64, variant: kheaders, runner: ubuntu-24.04-arm }
          - { cc: gcc-13, target: aarch64, variant: libdw, runner: ubuntu-24.04-arm }
          - { cc: gcc-13, target: aarch64, variant: libunwind, runner: ubuntu-24.04-arm }
          - { cc: gcc-12, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: gcc-12, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: gcc-12, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: gcc-12, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: gcc-12, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: gcc-11, target: x86_64, variant: kheaders, runner: ubuntu-22.04 }
          - { cc: gcc-11, target: x86_64, variant: libdw, runner: ubuntu-22.04 }
          - { cc: gcc-11, target: x86_64, variant: libunwind, runner: ubuntu-22.04 }
          - { cc: gcc-11, target: x86, variant: kheaders, runner: ubuntu-22.04 }
          - { cc: gcc-11, target: x86, variant: nostacktrace, runner: ubuntu-22.04 }
          - { cc: gcc-10, target: x86_64, variant: kheaders, runner: ubuntu-22.04 }
          - { cc: gcc-10, target: x86_64, variant: libdw, runner: ubuntu-22.04 }
          - { cc: gcc-10, target: x86_64, variant: libunwind, runner: ubuntu-22.04 }
          - { cc: gcc-10, target: x86, variant: kheaders, runner: ubuntu-22.04 }
          - { cc: gcc-10, target: x86, variant: nostacktrace, runner: ubuntu-22.04 }
          - { cc: gcc-9, target: x86_64, variant: kheaders, runner: ubuntu-22.04 }
          - { cc: gcc-9, target: x86_64, variant: libdw, runner: ubuntu-22.04 }
          - { cc: gcc-9, target: x86_64, variant: libunwind, runner: ubuntu-22.04 }
          - { cc: gcc-9, target: x86, variant: kheaders, runner: ubuntu-22.04 }
          - { cc: gcc-9, target: x86, variant: nostacktrace, runner: ubuntu-22.04 }
          - { cc: clang-19, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-19, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: clang-19, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: clang-19, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-19, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: clang-19, target: aarch64, variant: kheaders, runner: ubuntu-24.04-arm }
          - { cc: clang-19, target: aarch64, variant: libdw, runner: ubuntu-24.04-arm }
          - { cc: clang-19, target: aarch64, variant: libunwind, runner: ubuntu-24.04-arm }
          - { cc: clang-18, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-18, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: clang-18, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: clang-18, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-18, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: clang-18, target: aarch64, variant: kheaders, runner: ubuntu-24.04-arm }
          - { cc: clang-18, target: aarch64, variant: libdw, runner: ubuntu-24.04-arm }
          - { cc: clang-18, target: aarch64, variant: libunwind, runner: ubuntu-24.04-arm }
          - { cc: clang-17, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-17, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: clang-17, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: clang-17, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-17, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: clang-16, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-16, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: clang-16, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: clang-16, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-16, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: clang-15, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-15, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: clang-15, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: clang-15, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-15, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: clang-14, target: x86_64, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-14, target: x86_64, variant: libdw, runner: ubuntu-24.04 }
          - { cc: clang-14, target: x86_64, variant: libunwind, runner: ubuntu-24.04 }
          - { cc: clang-14, target: x86, variant: kheaders, runner: ubuntu-24.04 }
          - { cc: clang-14, target: x86, variant: nostacktrace, runner: ubuntu-24.04 }
          - { cc: musl-gcc, target: x86_64, variant: nostacktrace, runner: ubuntu-22.04 }
    name: Build ${{ matrix.cc }}-${{ matrix.target }}-${{ matrix.variant }}
    runs-on: ${{ matrix.runner }}
    env:
      CC: ${{ matrix.cc }}
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set environment variables
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          case "$VARIANT" in
            kheaders)
              echo 'STACKTRACE=no' >> "$GITHUB_ENV"
              echo 'KHEADERS=torvalds/linux' >> "$GITHUB_ENV"
              ;;
            nostacktrace)
              echo 'STACKTRACE=no' >> "$GITHUB_ENV"
              ;;
            libdw)
              echo 'STACKTRACE=libdw' >> "$GITHUB_ENV"
              ;;
            libunwind)
              echo 'STACKTRACE=libunwind' >> "$GITHUB_ENV"
              ;;
          esac

      - name: install dependencies
        run: ci/install-dependencies.sh

      - name: build check
        run: ci/run-build-and-tests.sh
